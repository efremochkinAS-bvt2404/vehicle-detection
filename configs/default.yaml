dataset:
  name: KITTI
  raw_dir: data/raw/KITTI
  processed_dir: data/processed
  images_dir: image_2
  labels_dir: label_2

classes:
  keep:
    - Car
    - Van
    - Truck
    - Tram
    - Cyclist

  labels_ru:
    Car: Автомобиль
    Van: Фургон
    Truck: Грузовик
    Tram: Трамвай
    Pedestrian: Пешеход
    Person_sitting: Сидящий человек
    Cyclist: Велосипедист
    Misc: Прочее
    DontCare: Игнорируемая область

  colors:
    Car: [0, 255, 0]
    Van: [255, 165, 0]
    Truck: [255, 0, 0]
    Tram: [0, 0, 255]
    Cyclist: [255, 0, 255]

split:
  train: 0.7
  val: 0.2
  test: 0.1

preprocessing:
  image_size: 640
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

augmentation:
  horizontal_flip: true
  color_jitter: true

evaluation:
  metrics:
    - map
    - map50
    - map50_95
    - precision
    - recall
    - f1
  prediction_images: 20
  confidence_threshold: 0.25

results:
  root_dir: results
  experiments_dir: results/experiments
  comparison_dir: results/comparison

random_seed: 42
