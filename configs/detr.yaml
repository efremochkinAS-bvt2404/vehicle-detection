model:
  name: detr
  display_name: DETR
  framework: transformers
  architecture: facebook/detr-resnet-50
  pretrained: true

training:
  epochs: 8
  batch_size: 4
  image_size: 512
  workers: 2
  device: 0
  optimizer: AdamW
  learning_rate: 0.00005
  backbone_learning_rate: 0.00001
  weight_decay: 0.0001
  momentum: 0.9
  gradient_clip_norm: 0.1
  seed: 42
  deterministic: true
  max_train_batches: null
  max_val_batches: null
  max_test_batches: null

augmentation:
  horizontal_flip: true
  color_jitter: true

results:
  experiment_prefix: detr
