model:
  name: faster_rcnn
  display_name: Faster R-CNN
  framework: torchvision
  architecture: fasterrcnn_resnet50_fpn_v2
  pretrained: true

training:
  epochs: 8
  batch_size: 2
  image_size: 640
  workers: 2
  device: 0
  optimizer: AdamW
  learning_rate: 0.0005
  weight_decay: 0.0005
  momentum: 0.9
  seed: 42
  deterministic: true
  max_train_batches: null
  max_val_batches: null
  max_test_batches: null

augmentation:
  horizontal_flip: true
  color_jitter: true

results:
  experiment_prefix: faster_rcnn
